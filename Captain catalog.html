let fTier='all';
function setF(k,v,btn){
  fTier=v;
  document.querySelectorAll('#tf .fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}
function render(){
  const q=document.getElementById('q').value.toLowerCase();
  const order=['ultra','prem','med','eco','spec','chem','wood','ind'];
  let total=0,html='';
  for(const tier of order){
    if(fTier!=='all'&&fTier!==tier) continue;
    const c=CATS[tier];
    const prods=P.filter(p=>{
      if(p.tier!==tier) return false;
      if(q&&!p.name.toLowerCase().includes(q)&&!p.sub.toLowerCase().includes(q)) return false;
      return true;
    });
    if(!prods.length) continue;
    total+=prods.length;
    html+=`<div class="cat-sec"><div class="cat-hdr"><div class="cat-dot ${c.dot}"></div><div class="cat-title">${c.label}</div><div class="cat-cnt">${prods.length} รายการ</div></div><div class="grid">`;
    for(const p of prods){
      html+=`<div class="card"><div class="card-top"><span class="tier-pill ${c.pill}">${p.sub.split('·')[0].trim()}</span><div><div class="card-name">${p.name}${p.isNew?'<span class="new-b">NEW</span>':''}</div></div></div><div class="prices">`;
      for(const pr of p.prices){
        html+=`<div class="pr"><div><div class="pr-sz">${pr.s}</div><div class="pr-pk">${pr.pk}</div></div><div style="text-align:right"><div class="pr-net">${pr.n.toLocaleString()} <span style="font-size:10px;color:var(--m)">บาท</span></div><div class="pr-vat">+VAT ${pr.v.toLocaleString()}</div></div></div>`;
      }
      html+=`</div><div class="card-ft"><span>${p.sub}</span><span>${p.solvent}</span></div></div>`;
    }
    html+='</div></div>';
  }
  if(!html) html='<div class="empty">ไม่พบสินค้าที่ค้นหา</div>';
  document.getElementById('ct').innerHTML=html;
  document.getElementById('st').innerHTML=`แสดง <b>${total}</b> รายการ`;
}
render();
</script>
