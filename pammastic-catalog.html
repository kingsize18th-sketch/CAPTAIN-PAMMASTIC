<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F1117;--s:#181C27;--s2:#1E2336;--b:#2A2F45;
  --t:#E8EAF0;--m:#7A809A;--acc:#4F8EF7;
  --pam:#A78BFA;--pam2:rgba(167,139,250,.12);
  --r:10px;
}
body{font-family:'IBM Plex Sans Thai',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;font-size:14px}
/* Header */
.hdr{background:var(--s);border-bottom:1px solid var(--b);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:12px}
.logo-box{background:var(--pam2);border:1px solid rgba(167,139,250,.3);border-radius:8px;padding:6px 12px;font-size:11px;font-weight:600;letter-spacing:.08em;color:var(--pam);text-transform:uppercase}
.logo h1{font-size:15px;font-weight:500;color:var(--t)}
.hdr-meta{font-size:11px;color:var(--m);font-family:'IBM Plex Mono',monospace;text-align:right;line-height:1.6}
/* Layout */
.wrap{max-width:1280px;margin:0 auto;padding:24px 20px}
/* Filters */
.filters{background:var(--s);border:1px solid var(--b);border-radius:var(--r);padding:16px 20px;margin-bottom:20px;display:flex;flex-wrap:wrap;gap:12px;align-items:center}
.search-box{flex:1;min-width:200px;padding:8px 14px;background:var(--s2);border:1px solid var(--b);border-radius:6px;color:var(--t);font-family:inherit;font-size:13px;outline:none}
.search-box:focus{border-color:var(--acc)}
.search-box::placeholder{color:var(--m)}
.filter-group{display:flex;gap:6px;flex-wrap:wrap}
.fb{padding:5px 12px;border:1px solid var(--b);border-radius:16px;background:none;color:var(--m);cursor:pointer;font-family:inherit;font-size:12px;transition:all .15s;white-space:nowrap}
.fb:hover{border-color:var(--pam);color:var(--pam)}
.fb.on{background:var(--pam2);border-color:var(--pam);color:var(--pam);font-weight:500}
.sep{width:1px;height:24px;background:var(--b);align-self:center}
/* Stats bar */
.stats{display:flex;gap:16px;margin-bottom:16px;font-size:12px;color:var(--m);align-items:center}
.stat-num{color:var(--t);font-weight:500;font-family:'IBM Plex Mono',monospace}
/* Category sections */
.cat-section{margin-bottom:28px}
.cat-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--b)}
.cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cat-title{font-size:14px;font-weight:500;color:var(--t)}
.cat-count{font-size:11px;color:var(--m);background:var(--s2);padding:2px 8px;border-radius:10px;font-family:'IBM Plex Mono',monospace}
/* Product cards grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.card{background:var(--s);border:1px solid var(--b);border-radius:var(--r);overflow:hidden;transition:border-color .15s}
.card:hover{border-color:rgba(167,139,250,.4)}
.card-hdr{padding:12px 14px 10px;border-bottom:1px solid var(--b);display:flex;align-items:flex-start;gap:8px}
.card-tier{font-size:10px;font-weight:500;letter-spacing:.06em;padding:2px 7px;border-radius:4px;flex-shrink:0;margin-top:2px;text-transform:uppercase}
.card-name{font-size:13px;font-weight:500;color:var(--t);line-height:1.4}
.prices{padding:10px 14px 12px}
.price-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:0.5px solid rgba(42,47,69,.5)}
.price-row:last-child{border-bottom:none}
.price-size{font-size:12px;color:var(--m)}
.price-net{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:500;color:var(--t)}
.price-vat{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--acc)}
.price-tag{font-size:10px;color:var(--m);margin-top:1px;text-align:right}
.card-footer{padding:8px 14px;background:var(--s2);display:flex;justify-content:space-between;font-size:11px;color:var(--m)}
/* tier colors */
.tier-ultra{background:rgba(167,139,250,.15);color:#A78BFA;border:1px solid rgba(167,139,250,.3)}
.tier-premium{background:rgba(79,142,247,.12);color:#4F8EF7;border:1px solid rgba(79,142,247,.3)}
.tier-medium{background:rgba(52,211,153,.1);color:#34D399;border:1px solid rgba(52,211,153,.25)}
.tier-economy{background:rgba(251,191,36,.1);color:#FBBF24;border:1px solid rgba(251,191,36,.25)}
.tier-wood{background:rgba(234,88,12,.12);color:#FB923C;border:1px solid rgba(234,88,12,.25)}
.tier-chem{background:rgba(244,114,182,.1);color:#F472B6;border:1px solid rgba(244,114,182,.25)}
/* Category dot colors */
.dot-ultra{background:#A78BFA}
.dot-premium{background:#4F8EF7}
.dot-medium{background:#34D399}
.dot-economy{background:#FBBF24}
.dot-wood{background:#FB923C}
.dot-chem{background:#F472B6}
/* Empty */
.empty{text-align:center;padding:60px;color:var(--m)}
/* new badge */
.new-badge{font-size:9px;background:rgba(248,113,113,.15);color:#F87171;border:1px solid rgba(248,113,113,.3);padding:1px 5px;border-radius:3px;margin-left:4px;vertical-align:middle;letter-spacing:.04em;font-weight:500}

let tierFilter='all', sizeFilter='all';

function setTier(v,btn){
  tierFilter=v;
  document.querySelectorAll('#tier-filters .fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}
function setSize(v,btn){
  sizeFilter=v;
  document.querySelectorAll('.fb[onclick^="setSize"]').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

function matchSize(p){
  if(sizeFilter==='all') return true;
  if(sizeFilter==='1gal') return p.size.includes('1 แกลลอน') && !p.size.includes('เบส');
  if(sizeFilter==='5gal') return p.size.includes('5 แกลลอน');
  return true;
}

function render(){
  const q = document.getElementById('q').value.toLowerCase();
  const content = document.getElementById('content');
  const tierOrder = ['ultra','premium','medium','economy','wood','chem'];
  let totalShown = 0;
  let html='';

  for(const tier of tierOrder){
    if(tierFilter!=='all' && tierFilter!==tier) continue;
    const cat = CATS[tier];
    const prods = PRODUCTS.filter(p=>{
      if(p.tier!==tier) return false;
      if(q && !p.name.toLowerCase().includes(q) && !p.code.toLowerCase().includes(q) && !p.sub.toLowerCase().includes(q)) return false;
      if(sizeFilter!=='all'){
        const hasPrices = p.prices.some(pr=>matchSize(pr));
        if(!hasPrices) return false;
      }
      return true;
    });
    if(!prods.length) continue;
    totalShown += prods.length;

    html+=`<div class="cat-section">
      <div class="cat-hdr">
        <div class="cat-dot ${cat.dotCls}"></div>
        <div class="cat-title">${cat.label}</div>
        <div class="cat-count">${prods.length} รายการ</div>
      </div>
      <div class="grid">`;

    for(const p of prods){
      const prices = sizeFilter==='all' ? p.prices : p.prices.filter(matchSize);
      html+=`<div class="card">
        <div class="card-hdr">
          <span class="card-tier ${cat.tierCls}">${p.sub}</span>
          <div>
            <div class="card-name">${p.name}${p.isNew?'<span class="new-badge">NEW</span>':''}</div>
          </div>
        </div>
        <div class="prices">`;
      for(const pr of prices){
        html+=`<div class="price-row">
          <div><div class="price-size">${pr.size}</div><div style="font-size:10px;color:var(--m)">${pr.pack}</div></div>
          <div style="text-align:right">
            <div class="price-net">${pr.net.toLocaleString()} <span style="font-size:10px;color:var(--m)">บาท</span></div>
            <div class="price-vat">+VAT ${pr.vat.toLocaleString()}</div>
          </div>
        </div>`;
      }
      html+=`</div>
        <div class="card-footer">
          <span>${p.code}</span>
          <span>${p.solvent}</span>
        </div>
      </div>`;
    }
    html+='</div></div>';
  }

  if(!html) html='<div class="empty">ไม่พบสินค้าที่ค้นหา</div>';
  content.innerHTML = html;
  document.getElementById('stats').innerHTML=`แสดง <span class="stat-num">${totalShown}</span> รายการ`;
}

render();
</script>
